version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: flowvibe-db
    environment:
      POSTGRES_USER: flowvibe
      POSTGRES_PASSWORD: flowvibe2024
      POSTGRES_DB: flowvibe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowvibe"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # pgAdmin (PostgreSQL Admin Interface)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flowvibe-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flowvibe.ai
      PGADMIN_DEFAULT_PASSWORD: flowvibe2024
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Backend API
  backend:
    image: node:20-alpine
    container_name: flowvibe-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      DATABASE_URL: postgresql://flowvibe:flowvibe2024@postgres:5432/flowvibe
      PORT: 3001
      JWT_SECRET: flowvibe-jwt-secret-2024
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Chat Widget (Embeddable widget)
  widget:
    image: node:20-alpine
    container_name: flowvibe-widget
    working_dir: /app
    command: sh -c "npm install && node server.js"
    environment:
      API_URL: http://backend:3001
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data: