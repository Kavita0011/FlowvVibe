name = "flowvibe-api"
main = "src/index.ts"  # Points to your Worker entry point
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"
# Add your Supabase URL here so the worker can talk to your DB
VITE_SUPABASE_URL = "https://mppsyxqlihmdsbrwlygz.supabase.co"
VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

# Static Assets (Your Vite Frontend)
[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# Keep these ONLY if you plan to cache specific marketplace data 
# on Cloudflare's edge. Otherwise, delete them to keep it clean.
[[kv_namespaces]]
binding = "PRICING"
id = "your-pricing-kv-id"

# Development Override
[env.dev]
name = "flowvibe-api-dev"
[env.dev.vars]
ENVIRONMENT = "development"